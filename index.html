<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Love-You</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Fira+Code:wght@400;500&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d12;
            --fg: #f0e6e8;
            --accent: #ff3366;
            --accent-soft: #ff6b8a;
            --glow: rgba(255, 51, 102, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
        }

        /* Ambient background */
        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .ambient::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60vmin;
            height: 60vmin;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: ambientPulse 4s ease-in-out infinite;
        }

        @keyframes ambientPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* تصميم زرار الصوت الجديد */
        .sound-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .sound-label {
            color: rgba(240, 230, 232, 0.7);
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .sound-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--glow);
        }

        .sound-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px var(--glow);
        }

        /* Main canvas */
        #heartCanvas {
            position: relative;
            z-index: 1;
        }

        /* Author signature */
        .signature {
            position: fixed;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Tajawal', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--accent-soft);
            opacity: 0;
            letter-spacing: 2px;
            text-align: center;
            z-index: 10;
            transition: opacity 1.5s ease;
            text-shadow: 0 0 20px var(--glow);
        }

        .signature.visible {
            opacity: 1;
        }

        /* Instructions */
        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: rgba(240, 230, 232, 0.4);
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .instructions.visible {
            opacity: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="babydoll-sound.mp3" loop></audio>

    <div class="sound-container">
        <span class="sound-label">open sound (babydoll)</span>
        <button class="sound-btn" id="playBtn">▶ تشغيل الصوت</button>
    </div>

    <div class="ambient"></div>
    <canvas id="heartCanvas"></canvas>
    <div class="signature" id="signature">By Omar Ahmed eLfnan | I love you</div>
    <div class="instructions" id="instructions">Again</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            const signatureEl = document.getElementById('signature');
            const instructionsEl = document.getElementById('instructions');
            const bgMusic = document.getElementById('bgMusic');
            const playBtn = document.getElementById('playBtn');

            // تشغيل الصوت لما تدوس على الزرار
            playBtn.addEventListener('click', function() {
                if (bgMusic.paused) {
                    bgMusic.play();
                    playBtn.innerHTML = '⏸ إيقاف الصوت';
                } else {
                    bgMusic.pause();
                    playBtn.innerHTML = '▶ تشغيل الصوت';
                }
            });

            // محاولة التشغيل التلقائي برضه لسه موجودة لعل وعسى تظبط
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    playBtn.innerHTML = '⏸ إيقاف الصوت';
                }).catch(function(error) {
                    // لو فشل التلقائي، الزرار موجود يقوم بالواجب
                });
            }

            // Configuration
            const config = {
                text: "I Love You ",
                fontSize: 13,
                fontFamily: "'Fira Code', monospace",
                typingSpeed: 40,
                color: '#ff3366',
                glowColor: 'rgba(255, 51, 102, 0.6)',
                finalColor: '#ff6b8a'
            };

            let width, height, centerX, centerY;
            let heartPath = [];
            let currentCharIndex = 0;
            let currentPointIndex = 0;
            let drawnChars = [];
            let animationId = null;
            let isDrawing = false;
            let cursorVisible = true;
            let cursorBlinkInterval = null;

            function heartX(t) {
                return 16 * Math.pow(Math.sin(t), 3);
            }

            function heartY(t) {
                return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            }

            function generateHeartPath() {
                heartPath = [];
                const scale = Math.min(width, height) / 38;
                const steps = 250; 
                
                for (let i = 0; i <= steps; i++) {
                    const t = (i / steps) * Math.PI * 2;
                    const x = centerX + heartX(t) * scale;
                    const y = centerY + heartY(t) * scale;
                    
                    heartPath.push({
                        x: x,
                        y: y,
                        char: config.text[i % config.text.length]
                    });
                }
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                centerX = width / 2;
                centerY = height / 2 + 20; 
                resetAnimation();
            }

            function resetAnimation() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                if (cursorBlinkInterval) {
                    clearInterval(cursorBlinkInterval);
                    cursorBlinkInterval = null;
                }
                
                drawnChars = [];
                currentPointIndex = 0;
                isDrawing = true;
                signatureEl.classList.remove('visible');
                instructionsEl.classList.remove('visible');
                
                generateHeartPath();
                startDrawing();
            }

            function drawCursor(x, y) {
                if (!cursorVisible) return;
                ctx.save();
                ctx.font = `${config.fontSize}px ${config.fontFamily}`;
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.9;
                ctx.fillText('|', x + 2, y);
                ctx.restore();
            }

            function drawPersistedChars() {
                ctx.clearRect(0, 0, width, height);
                drawnChars.forEach((charData, index) => {
                    ctx.save();
                    ctx.font = `${config.fontSize}px ${config.fontFamily}`;
                    const hue = 340 + (index / drawnChars.length) * 30;
                    ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
                    ctx.shadowColor = config.glowColor;
                    ctx.shadowBlur = 8;
                    ctx.fillText(charData.char, charData.x, charData.y);
                    ctx.restore();
                });
            }

            let lastDrawTime = 0;

            function startDrawing() {
                lastDrawTime = performance.now();
                cursorBlinkInterval = setInterval(() => {
                    cursorVisible = !cursorVisible;
                }, 500);
                animationLoop();
            }

            function animationLoop(timestamp) {
                if (!isDrawing) return;

                if (timestamp - lastDrawTime >= config.typingSpeed) {
                    if (currentPointIndex < heartPath.length) {
                        const point = heartPath[currentPointIndex];
                        drawnChars.push({
                            x: point.x,
                            y: point.y,
                            char: point.char
                        });
                        currentPointIndex++;
                        lastDrawTime = timestamp;
                    } else {
                        finishDrawing();
                        return;
                    }
                }

                drawPersistedChars();
                
                if (currentPointIndex < heartPath.length) {
                    const currentPoint = heartPath[currentPointIndex];
                    drawCursor(currentPoint.x, currentPoint.y);
                }

                animationId = requestAnimationFrame(animationLoop);
            }

            function finishDrawing() {
                isDrawing = false;
                if (cursorBlinkInterval) {
                    clearInterval(cursorBlinkInterval);
                }
                drawPersistedChars();
                
                setTimeout(() => {
                    signatureEl.classList.add('visible');
                }, 300);
                
                setTimeout(() => {
                    instructionsEl.classList.add('visible');
                }, 1500);
            }

            // Click to restart (استثنينا زرار الصوت عشان ميعملش ريستارت للرسمة)
            canvas.addEventListener('click', function() {
                if (!isDrawing) {
                    ctx.clearRect(0, 0, width, height);
                    resetAnimation();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    if (!isDrawing) {
                        ctx.clearRect(0, 0, width, height);
                        resetAnimation();
                    }
                }
            });

            window.addEventListener('resize', function() {
                if (!isDrawing) {
                    resize();
                }
            });
            
            resize();
        });
    </script>
</body>
</html>
